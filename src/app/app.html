<div
  class="relative flex items-center justify-center min-h-screen overflow-hidden"
  style="background-color: #0a0a0f; font-family: 'DM Sans', 'Segoe UI', sans-serif;"
>

  <!-- Textura de puntos de fondo -->
  <div
    class="absolute inset-0 pointer-events-none"
    aria-hidden="true"
    style="background-image: radial-gradient(circle, #ffffff18 1px, transparent 1px); background-size: 28px 28px;"
  ></div>

  <!-- Tarjeta central -->
  <main
    class="relative z-10 flex flex-col items-center gap-8 px-12 py-10 rounded-3xl card-anim"
    role="main"
    style="
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 32px 80px rgba(0,0,0,0.5);
    "
  >

    <!-- Header -->
    <header class="flex flex-col items-center gap-2 text-center">
      <span
        class="text-xs font-semibold tracking-widest uppercase"
        style="color: #6ee7b7; letter-spacing: 0.18em;"
      >
        Angular 21 + PrimeNG
      </span>
      <h1 class="text-5xl font-black tracking-tight leading-none" style="color: #f1f5f9;">
        TechStore<span style="color: #6ee7b7;">Pro</span>
      </h1>
      <p class="text-sm" style="color: #64748b;">
        Demo de componentes · Proyecto frontend
      </p>
    </header>

    <!-- Contador -->
    <section
      class="flex flex-col items-center gap-1"
      aria-live="polite"
      aria-label="Contador de clics"
    >
      <span
        class="text-8xl font-black tabular-nums leading-none"
        style="color: #f1f5f9; text-shadow: 0 0 40px rgba(110,231,183,0.25);"
      >
        {{ count() }}
      </span>
      <span class="text-sm" style="color: #475569;">{{ countLabel() }}</span>
    </section>

    <!-- Botones PrimeNG -->
    <div class="flex items-center gap-3" role="group" aria-label="Acciones del contador">
      <p-button
        label="Incrementar"
        icon="pi pi-plus"
        [loading]="isLoading()"
        (onClick)="increment()"
        styleClass="btn-primary"
      />
      <p-button
        label="Resetear"
        icon="pi pi-refresh"
        (onClick)="reset()"
        [text]="true"
        severity="secondary"
      />
    </div>

  </main>

</div>
